<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sellerd 상표출원용 로고</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
  body { margin: 0; padding: 40px; background: white; display: flex; flex-direction: column; gap: 40px; align-items: center; }
  .label { font-family: sans-serif; font-size: 12px; color: #999; }
  
  /* 출원용: 흰 배경 위 로고 (인쇄 기준) */
  .trademark {
    width: 500px;
    height: 500px;
    background: white;
    border: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  
  .tm-icon {
    width: 72px;
    height: 72px;
    background: #2ECC71;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 42px;
    font-weight: 800;
    color: white;
  }
  
  .tm-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 56px;
    font-weight: 800;
    color: #1A1A2E;
    letter-spacing: -1px;
  }
  
  .tm-text .d {
    font-family: 'JetBrains Mono', monospace;
    color: #2ECC71;
  }
  
  .info { font-family: sans-serif; font-size: 11px; color: #bbb; text-align: center; line-height: 1.8; }
</style>
</head>
<body>

<div class="label">상표출원용 로고 (문자+도형 결합상표)</div>
<div class="trademark">
  <div class="tm-icon">S</div>
  <div class="tm-text">seller<span class="d">d</span></div>
</div>

<div class="label">한글 표기</div>
<div class="trademark" style="height:200px">
  <div class="tm-icon">S</div>
  <div class="tm-text">seller<span class="d">d</span></div>
  <span style="font-family:'Plus Jakarta Sans'; font-size:20px; color:#1A1A2E; font-weight:700; margin-left:-8px;">(셀러드)</span>
</div>

<div class="info">
  ※ 이 파일을 브라우저에서 열고 스크린샷(PNG)으로 캡처하여 특허로에 업로드<br>
  ※ 권장: 500×500px 이상, 흰색 배경<br>
  ※ 출원 분류: 제9류(소프트웨어), 제35류(온라인상거래), 제42류(SaaS)<br>
  ※ 출원인: (주)퍼티스트<br>
  ※ 출원료: 138,000원 (3류 × 46,000원)
</div>

</body>
</html>
